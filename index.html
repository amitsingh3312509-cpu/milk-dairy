<!DOCTYPE html>
<html>
<head>

<title>Royal Pizza Home - Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f2f2f2;}

.header{
background:#ff3b3b;color:white;text-align:center;
padding:15px;font-size:22px;font-weight:bold;
}

.container{
max-width:700px;margin:20px auto;background:white;
padding:20px;border-radius:10px;
}

input,select{
width:100%;padding:10px;margin:6px 0;
}

button{
padding:12px;background:#28a745;color:white;
border:none;width:100%;border-radius:6px;margin-top:6px;
}

.cart{background:#eee;padding:10px;margin-top:10px;}
.note{color:red;font-weight:bold;text-align:center;}
.qr{width:200px;display:block;margin:auto;}

.bottom{
position:fixed;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:15px;
}

.bottom a{
color:white;padding:8px 14px;border-radius:20px;
text-decoration:none;font-size:14px;
}

.whatsapp{background:#25D366;}
.call{background:#ff3b3b;}

</style>

</head>

<body>

<div class="header">
🍕 Royal Pizza Home PRO
</div>

<div class="container">

<form action="https://formsubmit.co/YOUR-EMAIL@gmail.com" method="POST" enctype="multipart/form-data">

<h3>Pizza Menu / पिज़्ज़ा मेनू</h3>

<select id="pizza">
<option value="">Select Pizza</option>
<option value="150">Veg ₹150</option>
<option value="200">Paneer ₹200</option>
<option value="250">Cheese ₹250</option>
</select>

<input type="number" id="qty" value="1">

<button type="button" onclick="addCart()">Add To Cart</button>

<div class="cart">
<div id="cart"></div>
<p>Total ₹ <span id="total">0</span></p>
<p>Advance ₹ <span id="adv">0</span></p>
</div>

<h3>Customer Details / ग्राहक जानकारी</h3>

<input name="Name" placeholder="Name / नाम" required>
<input name="Mobile" placeholder="Mobile / मोबाइल" required>
<input name="Village" placeholder="Village / गांव" required>

<p class="note">
⚠️ 50% advance compulsory  
⚠️ QR scan सबसे सही तरीका
</p>

<h3>💳 Payment</h3>

<img class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=7309277213@ibl&pn=RoyalPizzaHome&cu=INR">

<p>UPI ID: <b>7309277213@ibl</b></p>

<button type="button" onclick="copyUPI()">Copy UPI</button>
<button type="button" onclick="openUPI()">Open App</button>

<h3>📸 Upload Payment Screenshot</h3>
<input type="file" name="Screenshot" required>

<h3>Transaction ID</h3>
<input name="TransactionID" required>

<input type="hidden" name="OrderDetails" id="orderData">

<button type="submit">Submit Order</button>

</form>

<button onclick="downloadPDF()">Download Receipt</button>

</div>

<div class="bottom">
<a class="whatsapp" href="https://wa.me/917309277213">WhatsApp</a>
<a class="call" href="tel:7309277213">Call</a>
</div>

<script>

let cart=[],total=0;

function addCart(){
let p=document.getElementById("pizza");
let name=p.options[p.selectedIndex].text;
let price=p.value;
let q=document.getElementById("qty").value;

if(price==""){alert("Select Pizza");return;}

cart.push({name,price,q});
total+=price*q;
showCart();
}

function showCart(){
let box=document.getElementById("cart");
box.innerHTML="";
cart.forEach(c=>{
box.innerHTML+=c.name+" x"+c.q+" ₹"+(c.price*c.q)+"<br>";
});
document.getElementById("total").innerText=total;
document.getElementById("adv").innerText=Math.round(total/2);
}

/* PAYMENT */

function copyUPI(){
navigator.clipboard.writeText("7309277213@ibl");
alert("Copied");
}

function openUPI(){
window.location.href="upi://pay?pa=7309277213@ibl&pn=RoyalPizzaHome&cu=INR";
}

/* FORM DATA */

document.querySelector("form").addEventListener("submit",function(){
let data="";
cart.forEach(c=>{
data+=c.name+" x"+c.q+" ₹"+(c.price*c.q)+" | ";
});
document.getElementById("orderData").value=data;
});

/* PDF */

function downloadPDF(){
const {jsPDF}=window.jspdf;
let pdf=new jsPDF();

pdf.text("Royal Pizza Receipt",20,20);
pdf.text("Total: "+total,20,40);
pdf.text("Advance: "+Math.round(total/2),20,50);

pdf.save("receipt.pdf");
}

</script>

</body>
 </html>
