<!DOCTYPE html>
<html>
<head>

<title>Royal Pizza Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f2f2f2;}

.header{
background:#ff3b3b;color:white;text-align:center;
padding:15px;font-size:22px;
}

.container{
max-width:700px;margin:20px auto;background:white;
padding:20px;border-radius:10px;
}

input,select{
width:100%;padding:10px;margin:6px 0;
}

button{
padding:12px;background:#28a745;color:white;
border:none;width:100%;border-radius:6px;margin-top:6px;
}

.cart{background:#eee;padding:10px;margin-top:10px;}
.remove{background:red;font-size:12px;padding:3px 8px;}

.note{color:red;font-weight:bold;text-align:center;}

.qr{width:200px;display:block;margin:auto;}

.bottom{
position:fixed;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:15px;
}

.bottom a{
color:white;padding:8px 14px;border-radius:20px;
text-decoration:none;font-size:14px;
}

.whatsapp{background:#25D366;}
.call{background:#ff3b3b;}

</style>

</head>

<body>

<div class="header">
🍕 Royal Pizza Home / रॉयल पिज़्ज़ा होम
</div>

<div class="container">

<h3>Pizza Menu / पिज़्ज़ा मेनू</h3>

<select id="pizza">
<option value="">Select Pizza / चुनें</option>
<option value="2">Veg ₹2</option>
<option value="200">Paneer ₹200</option>
<option value="250">Cheese ₹250</option>
</select>

<input type="number" id="qty" value="1">

<button onclick="addCart()">Add To Cart / जोड़ें</button>

<div class="cart">
<div id="cart"></div>
<p>Total ₹ <span id="total">0</span></p>
<p>Advance ₹ <span id="adv">0</span></p>
</div>

<h3>Customer / ग्राहक</h3>

<input id="name" placeholder="Name / नाम">
<input id="mobile" placeholder="Mobile / मोबाइल">
<input id="village" placeholder="Village / गांव">

<p class="note">
⚠️ 50% advance compulsory / 50% भुगतान जरूरी
</p>

<h3>Payment Options / भुगतान विकल्प</h3>

<button onclick="payUPI()">📱 Pay via UPI ID</button>
<button onclick="payNumber()">📱 Pay via Mobile Number</button>

<img class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=7309277213@ibl&pn=RoyalPizzaHome&cu=INR">

<p style="text-align:center;">Scan QR / QR स्कैन करें</p>

<input id="txn" placeholder="Transaction ID / ट्रांजैक्शन आईडी">

<button onclick="submitOrder()">Submit Order / ऑर्डर भेजें</button>

<button onclick="downloadPDF()">Download Receipt / रसीद डाउनलोड</button>

</div>

<div class="bottom">
<a class="whatsapp" id="wa">WhatsApp</a>
<a class="call" href="tel:7309277213">Call</a>
</div>

<script>

let cart=[],total=0;

/* ADD CART */
function addCart(){
let p=document.getElementById("pizza");
let name=p.options[p.selectedIndex].text;
let price=p.value;
let q=document.getElementById("qty").value;

if(price==""){alert("Select Pizza");return;}

cart.push({name,price,q});
total+=price*q;
showCart();
}

/* SHOW CART */
function showCart(){
let box=document.getElementById("cart");
box.innerHTML="";
cart.forEach((c,i)=>{
box.innerHTML+=c.name+" x"+c.q+" ₹"+(c.price*c.q)+
" <button class='remove' onclick='removeItem("+i+")'>X</button><br>";
});
document.getElementById("total").innerText=total;
document.getElementById("adv").innerText=Math.round(total/2);
}

/* REMOVE */
function removeItem(i){
total-=cart[i].price*cart[i].q;
cart.splice(i,1);
showCart();
}

/* UPI ID */
function payUPI(){
window.location.href="upi://pay?pa=7309277213@ibl&pn=RoyalPizzaHome&cu=INR";
}

/* MOBILE */
function payNumber(){
window.location.href="upi://pay?pa=7309277213@upi&pn=RoyalPizzaHome&cu=INR";
}

/* ORDER */
function submitOrder(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let village=document.getElementById("village").value;
let txn=document.getElementById("txn").value;

if(name==""||mobile==""||village==""||txn==""){
alert("Fill all details");
return;
}

let msg="🍕 Order\nName:"+name+"\nMobile:"+mobile+
"\nVillage:"+village+"\nItems:"+JSON.stringify(cart)+
"\nTotal ₹"+total+"\nTxn:"+txn;

window.open("https://wa.me/917309277213?text="+encodeURIComponent(msg));

}

/* PDF */
function downloadPDF(){
const {jsPDF}=window.jspdf;
let pdf=new jsPDF();

let y=20;

pdf.text("Royal Pizza Receipt",20,y); y+=10;

pdf.text("Name:"+name.value,20,y); y+=8;
pdf.text("Mobile:"+mobile.value,20,y); y+=8;
pdf.text("Village:"+village.value,20,y); y+=10;

cart.forEach(c=>{
pdf.text(c.name+" x"+c.q+" ₹"+(c.price*c.q),20,y);
y+=8;
});

pdf.text("Total:"+total,20,y); y+=8;
pdf.text("Advance:"+Math.round(total/2),20,y); y+=8;
pdf.text("Txn:"+txn.value,20,y);

pdf.save("receipt.pdf");
}

</script>

</body>
 </html>
