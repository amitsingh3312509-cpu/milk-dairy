
<!DOCTYPE html>
<html>
<head>
<title>Royal Pizza Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
}

.box{
max-width:450px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
}

h2{
text-align:center;
color:red;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
}

button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
font-size:16px;
margin-top:8px;
}

.info{
font-size:16px;
text-align:center;
color:green;
}

</style>
</head>

<body>

<div class="box">

<h2>🍕 Royal Pizza Home</h2>

<label>Name / नाम</label>
<input type="text" id="name">

<label>Mobile Number / मोबाइल नंबर</label>
<input type="number" id="mobile">

<label>Village / गाँव</label>
<input type="text" id="village">

<label>Select Pizza / पिज़्ज़ा चुनें</label>
<select id="pizza" onchange="calculate()">

<option value="">Select</option>

<option value="20">Margherita Pizza / मार्गेरिटा पिज़्ज़ा ₹20</option>
<option value="2">Veg Pizza / वेज पिज़्ज़ा ₹2</option>
<option value="200">Paneer Pizza / पनीर पिज़्ज़ा ₹200</option>
<option value="250">Farmhouse Pizza / फार्महाउस पिज़्ज़ा ₹250</option>

</select>

<label>Quantity / मात्रा</label>
<input type="number" id="qty" value="1" min="1" onchange="calculate()">

<label>Piece / Plate</label>
<select>
<option>Piece</option>
<option>Plate</option>
</select>

<div class="info">
Date: <span id="date"></span>
</div>

<div class="info">
Time: <span id="time"></span>
</div>

<div class="info">
Day: <span id="day"></span>
</div>

<div class="info">
Receipt No: <span id="receipt"></span>
</div>

<div class="info">
Total ₹ <span id="total">0</span>
</div>

<div class="info">
Advance 50% ₹ <span id="advance">0</span>
</div>

<button onclick="payUPI()">Pay Advance / एडवांस पेमेंट</button>

<a href="tel:7309277213">
<button type="button">Call / कॉल करें</button>
</a>

<a href="https://wa.me/917309277213">
<button type="button">WhatsApp Order</button>
</a>

</div>

<script>

function calculate(){

let price=document.getElementById("pizza").value;
let qty=document.getElementById("qty").value;

let total=price*qty;

document.getElementById("total").innerText=total;

let adv=Math.round(total/2);

document.getElementById("advance").innerText=adv;

}

function payUPI(){

let amount=document.getElementById("advance").innerText;

if(amount==0){

alert("Please select pizza first");

return;

}

let upi="upi://pay?pa=7309277213&pn=RoyalPizzaHome&am="+amount+"&cu=INR";

window.location.href=upi;

}

function setDateTime(){

let d=new Date();

document.getElementById("date").innerText=d.toLocaleDateString();

document.getElementById("time").innerText=d.toLocaleTimeString();

document.getElementById("day").innerText=d.toLocaleDateString('en-US',{weekday:'long'});

document.getElementById("receipt").innerText="RP"+Math.floor(Math.random()*100000);

}

setDateTime();

</script>

</body>
                      </html>
