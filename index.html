<!DOCTYPE html>
<html>
<head>
<title>Royal Pizza Home Order</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ff512f,#dd2476);
margin:0;
}

.container{
max-width:520px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

h2{
text-align:center;
color:#dd2476;
}

label{
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-top:8px;
font-size:16px;
}

.pay{
background:green;
color:white;
}

.submit{
background:#dd2476;
color:white;
}

.submit:disabled{
background:gray;
}

.info{
background:#f2f2f2;
padding:10px;
border-radius:6px;
margin:10px 0;
}

.total{
font-size:18px;
color:green;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>🍕 Royal Pizza Home</h2>

<form action="https://formsubmit.co/amitsingh3312509@gmail.com" method="POST">

<label>Name / नाम</label>
<input type="text" name="Customer Name" required>

<label>Mobile Number / मोबाइल नंबर</label>
<input type="tel" name="Mobile Number" required>

<label>Village / गांव</label>
<input type="text" name="Village">

<label>Select Pizza / पिज़्ज़ा चुनें</label>

<select id="pizza" onchange="calculate()" name="Pizza">

<option value="">Select</option>

<option value="150">
Margherita Pizza / मार्घेरिटा ₹150
</option>

<option value="180">
Veg Pizza / वेज पिज़्ज़ा ₹180
</option>

<option value="200">
Paneer Pizza / पनीर पिज़्ज़ा ₹200
</option>

<option value="250">
Farmhouse Pizza / फार्महाउस ₹250
</option>

</select>

<label>Quantity / मात्रा</label>
<input type="number" id="qty" value="1" min="1" onchange="calculate()" name="Quantity">

<label>Unit / प्रकार</label>

<select name="Unit">

<option>Piece / पीस</option>
<option>Plate / प्लेट</option>

</select>

<div class="total">
Total Amount ₹ <span id="total">0</span>
</div>

<div class="total">
Advance 50% ₹ <span id="advance">0</span>
</div>

<input type="hidden" name="Total Amount" id="totalInput">
<input type="hidden" name="Advance Payment" id="advanceInput">

<div class="info">

<p><b>Date:</b> <span id="date"></span></p>
<p><b>Time:</b> <span id="time"></span></p>
<p><b>Day:</b> <span id="day"></span></p>
<p><b>Receipt No:</b> <span id="receipt"></span></p>

</div>

<input type="hidden" name="Date" id="dateInput">
<input type="hidden" name="Time" id="timeInput">
<input type="hidden" name="Day" id="dayInput">
<input type="hidden" name="Receipt No" id="receiptInput">

<h3>UPI Payment</h3>

<p>UPI ID: 7309277213@ibl</p>

<button type="button" class="pay" onclick="payNow()">
Pay 50% Advance
</button>

<button type="submit" class="submit" id="submitBtn" disabled>
Place Order
</button>

</form>

</div>

<script>

function calculate(){

var pizza=document.getElementById("pizza").value;
var qty=document.getElementById("qty").value;

var total=pizza*qty;

document.getElementById("total").innerHTML=total;

var adv=Math.round(total/2);

document.getElementById("advance").innerHTML=adv;

document.getElementById("totalInput").value=total;
document.getElementById("advanceInput").value=adv;

}

function payNow(){

var adv=document.getElementById("advanceInput").value;

if(adv==0){

alert("Please select pizza first");

return;

}

var upi="upi://pay?pa=yourupi@upi&pn=RoyalPizzaHome&am="+adv+"&cu=INR";

window.location.href=upi;

setTimeout(function(){

alert("Payment done. Now place order.");

document.getElementById("submitBtn").disabled=false;

},3000);

}

var d=new Date();

var days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

document.getElementById("date").innerText=d.toLocaleDateString();
document.getElementById("time").innerText=d.toLocaleTimeString();
document.getElementById("day").innerText=days[d.getDay()];

document.getElementById("dateInput").value=d.toLocaleDateString();
document.getElementById("timeInput").value=d.toLocaleTimeString();
document.getElementById("dayInput").value=days[d.getDay()];

var receipt="RP"+Math.floor(Math.random()*1000000);

document.getElementById("receipt").innerText=receipt;
document.getElementById("receiptInput").value=receipt;

</script>

</body>
  </html>
