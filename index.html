<!DOCTYPE html>
<html>
<head>

<title>Royal Pizza Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f2f2f2;}

.header{
background:#ff3b3b;color:white;text-align:center;
padding:15px;font-size:24px;font-weight:bold;
}

.container{
max-width:700px;margin:20px auto;background:white;
padding:20px;border-radius:10px;
}

input,select{
width:100%;padding:10px;margin:6px 0;
border-radius:5px;border:1px solid #ccc;
}

button{
padding:12px;background:#28a745;color:white;
border:none;width:100%;border-radius:6px;margin-top:6px;
}

.cart{
background:#eee;padding:10px;margin-top:10px;border-radius:6px;
}

.remove{
background:red;font-size:12px;padding:3px 8px;
}

.note{
color:red;text-align:center;font-weight:bold;
}

.bottom{
position:fixed;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:20px;
}

.bottom a{
color:white;padding:8px 15px;border-radius:20px;
text-decoration:none;font-size:14px;
}

.whatsapp{background:#25D366;}
.call{background:#ff3b3b;}

</style>

</head>

<body>

<div class="header">
🍕 Royal Pizza Home / रॉयल पिज़्ज़ा होम
</div>

<div class="container">

<h3>Pizza Menu / पिज़्ज़ा मेनू</h3>

<select id="pizza">
<option value="">Select Pizza / पिज़्ज़ा चुनें</option>
<option value="2">Veg Pizza ₹2 / वेज पिज़्ज़ा</option>
<option value="10">Paneer Pizza ₹10 / पनीर पिज़्ज़ा</option>
<option value="250">Cheese Pizza ₹250 / चीज़ पिज़्ज़ा</option>
</select>

<label>Quantity / मात्रा</label>
<input type="number" id="qty" value="1">

<button onclick="addCart()">
Add To Cart / कार्ट में जोड़ें
</button>

<div class="cart">
<h4>Cart / कार्ट</h4>
<div id="cart"></div>

<p>Total / कुल ₹ <span id="total">0</span></p>
<p>Advance 50% / अग्रिम ₹ <span id="adv">0</span></p>
</div>

<h3>Customer Details / ग्राहक जानकारी</h3>

<input id="name" placeholder="Name / नाम" required>
<input id="mobile" placeholder="Mobile / मोबाइल" required>
<input id="village" placeholder="Village / गांव" required>

<p class="note">
⚠️ 50% Advance Payment Compulsory  
⚠️ 50% अग्रिम भुगतान अनिवार्य है
</p>

<button onclick="payUPI()">
💳 Pay 50% Advance / 50% अग्रिम भुगतान करें
</button>

<input id="txn" placeholder="Transaction ID / ट्रांजैक्शन आईडी डालें">

<button onclick="submitOrder()">
Submit Order / ऑर्डर भेजें
</button>

<button onclick="downloadPDF()">
📄 Download Receipt / रसीद डाउनलोड करें
</button>

</div>

<div class="bottom">
<a class="whatsapp" id="wa">WhatsApp</a>
<a class="call" href="tel:7309277213">Call</a>
</div>

<script>

let cart=[],total=0,paid=false;

/* ADD CART */
function addCart(){
let p=document.getElementById("pizza");
let name=p.options[p.selectedIndex].text;
let price=p.value;
let q=document.getElementById("qty").value;

if(price==""){
alert("Select Pizza / पिज़्ज़ा चुनें");
return;
}

cart.push({name,price,q});
total+=price*q;
showCart();
}

/* SHOW CART */
function showCart(){
let box=document.getElementById("cart");
box.innerHTML="";

cart.forEach((c,i)=>{
box.innerHTML+=c.name+" x"+c.q+" ₹"+(c.price*c.q)+
" <button class='remove' onclick='removeItem("+i+")'>X</button><br>";
});

document.getElementById("total").innerText=total;
document.getElementById("adv").innerText=Math.round(total/2);
}

/* REMOVE ITEM */
function removeItem(i){
total-=cart[i].price*cart[i].q;
cart.splice(i,1);
showCart();
}

/* UPI PAYMENT */
function payUPI(){

let adv=Math.round(total/2);

if(adv==0){
alert("Select pizza first / पहले पिज़्ज़ा चुनें");
return;
}

let upi="upi://pay?pa=7309277213@ibl&pn=RoyalPizzaHome&am="+adv+"&cu=INR";

window.location.href=upi;

paid=true;
}

/* SUBMIT ORDER */
function submitOrder(){

if(!paid){
alert("Please pay first / पहले भुगतान करें");
return;
}

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let village=document.getElementById("village").value;
let txn=document.getElementById("txn").value;

if(name=="" || mobile=="" || village=="" || txn==""){
alert("Fill all details / सभी जानकारी भरें");
return;
}

let msg="🍕 Order / ऑर्डर\n";
msg+="Name: "+name+"\n";
msg+="Mobile: "+mobile+"\n";
msg+="Village: "+village+"\n";
msg+="Items: "+JSON.stringify(cart)+"\n";
msg+="Total ₹"+total+"\n";
msg+="Txn: "+txn;

let wa="https://wa.me/917309277213?text="+encodeURIComponent(msg);

window.open(wa);

alert("Order Sent on WhatsApp / ऑर्डर भेज दिया गया");
}

/* PDF RECEIPT */
function downloadPDF(){

const {jsPDF}=window.jspdf;
let pdf=new jsPDF();

let y=20;

pdf.text("Royal Pizza Home Receipt / रॉयल पिज़्ज़ा रसीद",20,y); y+=10;

pdf.text("Name: "+document.getElementById("name").value,20,y); y+=8;
pdf.text("Mobile: "+document.getElementById("mobile").value,20,y); y+=8;
pdf.text("Village: "+document.getElementById("village").value,20,y); y+=10;

cart.forEach(c=>{
pdf.text(c.name+" x"+c.q+" ₹"+(c.price*c.q),20,y);
y+=8;
});

pdf.text("Total: ₹"+total,20,y); y+=8;
pdf.text("Advance: ₹"+Math.round(total/2),20,y); y+=8;
pdf.text("Transaction ID: "+document.getElementById("txn").value,20,y);

pdf.save("Receipt.pdf");
}

</script>

</body>
 </html>
