<!DOCTYPE html>
<html>
<head>
<title>Amantran Restaurant Bansdih Order</title>

<style>

body{
font-family:Arial;
background:linear-gradient(45deg,#ff6a00,#ee0979);
text-align:center;
color:white;
}

form{
background:white;
color:black;
padding:20px;
width:350px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input,select{
width:100%;
padding:8px;
margin:6px 0;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px;
width:100%;
font-size:16px;
border-radius:5px;
}

</style>

<script>

function calculate(){

let food=document.getElementById("food")

let price=parseInt(food.options[food.selectedIndex].getAttribute("data-price"))

let piece=document.getElementById("piece").value

let total=price*piece

document.getElementById("total").value=total

let advance=total/2

document.getElementById("advance").value=advance

}

function payAndSubmit(){

let advance=document.getElementById("advance").value

let upi="upi://pay?pa=7309277213@ibl&pn=Amantran%20Restaurant&am="+advance+"&cu=INR"

window.location.href=upi

setTimeout(function(){

document.getElementById("orderform").submit()

},2000)

}

</script>

</head>

<body>

<h1>Amantran Restaurant</h1>

<form id="orderform" action="https://formsubmit.co/amitsingh3312509@gmail.com" method="POST">

<input type="hidden" name="_captcha" value="false">

Name
<input type="text" name="Customer Name" required>

Mobile
<input type="text" name="Mobile" required>

Village
<select name="Village Name">

<option>Ballia</option>
<option>Bansdih</option>
<option>Maniyar</option>
<option>Sahatwar</option>
<option>Reoti</option>
<option>Bairia</option>

</select>

Food Item
<select id="food" name="Food Name" onchange="calculate()">

<option data-price="100">Veg Burger ₹100</option>
<option data-price="120">Paneer Butter Masala ₹120</option>
<option data-price="150">Chicken Curry ₹150</option>
<option data-price="80">Veg Noodles ₹80</option>
<option data-price="60">Chowmein ₹60</option>

</select>

Piece
<input type="number" id="piece" name="Piece" value="1" onchange="calculate()">

Total Price
<input type="text" id="total" name="Total Price" readonly>

Advance (50%)
<input type="text" id="advance" name="Advance Price" readonly>

<br><br>

<button type="button" onclick="payAndSubmit()">
Pay & Submit Order
</button>

</form>

</body>
  </html>
